# Site settings
title: Shreyansh | Homepage 
description: "Personal homepage and blog."
url: "https://shrrynsh.github.io"
author:
  name: "Shreyansh"
  email: "your.email@example.com"
  url: "https://shrrynsh.github.io/homepage"

# Build settings
baseurl: /homepage # Change this to your relative path (ex: /blog/), or leave just a /
markdown: kramdown
source: .
destination: ./_site
permalink: /:title
paginate: 8
paginate_path: /page:num/

# Default values
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Plugins
gems:
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
version: "1.0.0"

# Options
custom_header: false
custom_nav_footer: false
reverse: false
